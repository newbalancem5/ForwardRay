name: Release

# Build installers and attach them to a GitHub Release when a version tag is
# pushed (e.g. `git tag v1.0.0 && git push origin v1.0.0`).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build macos --release

      - name: Bundle sing-box core into the .app
        run: |
          VER=1.11.15
          ARCH=$(uname -m); case $ARCH in arm64|aarch64) A=arm64;; *) A=amd64;; esac
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v$VER/sing-box-$VER-darwin-$A.tar.gz" | tar xz
          RES="build/macos/Build/Products/Release/ForwardRay.app/Contents/Resources"
          mkdir -p "$RES"
          cp "sing-box-$VER-darwin-$A/sing-box" "$RES/sing-box"
          chmod +x "$RES/sing-box"
          cp "sing-box-$VER-darwin-$A/LICENSE" "$RES/sing-box-LICENSE" 2>/dev/null || true

      - name: Create DMG (drag-to-Applications)
        run: |
          APP="build/macos/Build/Products/Release/ForwardRay.app"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "ForwardRay" \
            -srcfolder "$STAGE" -ov -format UDZO "ForwardRay-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: ForwardRay-macos-dmg
          path: ForwardRay-macos.dmg

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ForwardRay-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter build windows --release

      - name: Bundle sing-box core next to the .exe
        shell: pwsh
        run: |
          $ver = "1.11.15"
          $arch = if ($env:PROCESSOR_ARCHITECTURE -match "ARM") { "arm64" } else { "amd64" }
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$ver/sing-box-$ver-windows-$arch.zip"
          Invoke-WebRequest -Uri $url -OutFile sb.zip
          Expand-Archive sb.zip -DestinationPath sb -Force
          Copy-Item "sb/sing-box-$ver-windows-$arch/sing-box.exe" "build/windows/x64/runner/Release/sing-box.exe" -Force
          Copy-Item "sb/sing-box-$ver-windows-$arch/LICENSE" "build/windows/x64/runner/Release/sing-box-LICENSE.txt" -Force

      - name: Build installer (.exe) with Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $ver = "${{ github.ref_name }}".TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver installer\forwardray.iss

      - name: Zip portable build
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* `
            -DestinationPath ForwardRay-windows-portable.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: ForwardRay-windows
          path: |
            ForwardRay-windows-setup.exe
            ForwardRay-windows-portable.zip

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ForwardRay-windows-setup.exe
            ForwardRay-windows-portable.zip
