name: forwardray
description: "ForwardRay — simple and beautiful v2ray/sing-box client for Windows and macOS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  # Desktop window + tray
  window_manager: ^0.4.3
  tray_manager: ^0.3.2
  launch_at_startup: ^0.5.1
  package_info_plus: ^8.1.0

  # Storage / paths
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Networking
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Windows system proxy (registry)
  win32_registry: ^2.1.0

  # Utils
  uuid: ^4.5.1
  collection: ^1.18.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  intl: any
  flutter_localizations:
    sdk: flutter
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/ca/
